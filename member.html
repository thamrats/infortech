<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสมาชิก - Member Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2395BD76'/><circle cx='50' cy='40' r='15' fill='white'/><path d='M20 80c0-15 10-25 30-25s30 10 30 25' fill='white'/></svg>">
    <style>
        :root {
            --primary: #95BD76;
            --primary-light: #E9F3E3;
            --accent: #F8BBD0;
            --accent-light: #FCE4EC;
            --bg-main: #FBFDFB;
            --bg-card: #ffffff;
            --text-main: #2D3436;
            --text-muted: #636E72;
            --border: #E8EEE5;
            --radius: 16px;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-main); color: var(--text-main); }

        .hidden { display: none !important; }

        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-card); border-right: 1px solid var(--border); padding: 2.5rem 1.5rem; position: fixed; height: 100vh; z-index: 100; }
        .logo-section { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 3.5rem; color: var(--primary); }
        .logo-text { font-weight: 800; font-size: 1.6rem; }
        .nav-links { list-style: none; }
        .nav-links li { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; margin-bottom: 0.75rem; border-radius: var(--radius); cursor: pointer; color: var(--text-muted); transition: 0.3s; }
        .nav-links li.active { background-color: var(--primary); color: white; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2.5rem; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; gap: 2rem; }
        .search-container { position: relative; flex: 1; max-width: 600px; }
        #search-input { width: 100%; padding: 1rem 1rem 1rem 3.5rem; border: 2px solid var(--border); border-radius: var(--radius); outline: none; }
        .search-icon { position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: var(--radius); box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; margin-top: 10px; }
        .search-item { padding: 1rem; cursor: pointer; border-bottom: 1px solid var(--border); }
        .search-item:hover { background: var(--primary-light); }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: var(--radius); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .btn-secondary { background: white; border: 2px solid var(--border); padding: 0.8rem 1.5rem; border-radius: var(--radius); cursor: pointer; }
        .btn-danger { background: #FFF0F0; color: #FF7675; border: 2px solid #FFE0E0; padding: 0.8rem 1.5rem; border-radius: var(--radius); cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; width: 90%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 2px solid var(--border); border-radius: 12px; outline: none; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; }

        .card { background: white; padding: 2rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #fff, var(--primary-light)); }
        .large-avatar { width: 80px; height: 80px; background: var(--accent); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; }
        
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); justify-content: space-around; padding: 1rem; z-index: 1000; }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-bottom: 100px; }
            .mobile-nav { display: flex; }
            .header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo-section">
                <i data-lucide="user-check"></i>
                <span class="logo-text">MemberHub</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-section="profile"><i data-lucide="user"></i><span>ประวัติลูกค้า</span></li>
                <li data-section="history"><i data-lucide="shopping-bag"></i><span>ประวัติการซื้อ</span></li>
                <li data-section="points"><i data-lucide="award"></i><span>แต้มสะสม</span></li>
                <li data-section="privileges"><i data-lucide="star"></i><span>สิทธิพิเศษ</span></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="search-input" placeholder="ค้นหาเบอร์โทร หรือ รหัสสมาชิก...">
                    <div id="search-results" class="search-results hidden"></div>
                </div>
                <button class="btn-primary" id="btn-register">
                    <i data-lucide="plus"></i> <span>ลงทะเบียนใหม่</span>
                </button>
            </header>

            <div id="welcome-state" class="state-view">
                <div class="card" style="text-align:center; padding: 5rem 2rem;">
                    <i data-lucide="users" style="width:64px; height:64px; opacity:0.2; margin-bottom:1rem;"></i>
                    <h2>ยินดีต้อนรับ</h2>
                    <p>กรุณาค้นหาสมาชิกหรือลงทะเบียนใหม่</p>
                </div>
            </div>

            <section id="profile-section" class="state-view hidden">
                <div class="card profile-header">
                    <div style="display:flex; align-items:center; gap:1.5rem;">
                        <div class="large-avatar" id="member-avatar-char">?</div>
                        <div>
                            <h1 id="member-name">ชื่อ-นามสกุล</h1>
                            <p id="member-id" style="color:var(--text-muted)">รหัส: 000</p>
                        </div>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <button class="btn-secondary" id="btn-edit-member">แก้ไข</button>
                        <button class="btn-danger" id="btn-delete-member">ลบ</button>
                    </div>
                </div>
                <div class="card">
                    <h3>ข้อมูลติดต่อ</h3>
                    <p>เบอร์โทร: <strong id="member-phone"></strong></p>
                    <p>อีเมล: <strong id="member-email"></strong></p>
                    <p>ระดับ: <strong id="member-tier"></strong></p>
                </div>
            </section>

            <section id="history-section" class="state-view hidden">
                <div class="card">
                    <h3>ประวัติการซื้อ</h3>
                    <div id="history-list"></div>
                </div>
            </section>

            <section id="points-section" class="state-view hidden">
                <div class="card">
                    <h3>แต้มสะสม</h3>
                    <h1 id="member-points" style="font-size:3rem; color:var(--primary)">0</h1>
                </div>
            </section>

            <section id="privileges-section" class="state-view hidden">
                <div class="card">
                    <h3>สิทธิพิเศษ</h3>
                    <div id="privilege-list"></div>
                </div>
            </section>
        </main>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item active" data-section="profile"><i data-lucide="user"></i></div>
        <div class="nav-item" data-section="history"><i data-lucide="shopping-bag"></i></div>
        <div class="nav-item" data-section="points"><i data-lucide="award"></i></div>
        <div class="nav-item" data-section="privileges"><i data-lucide="star"></i></div>
    </nav>

    <div id="member-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">ลงทะเบียนสมาชิก</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <form id="member-form">
                <input type="hidden" id="edit-member-id">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" id="input-name" required>
                </div>
                <div class="form-group">
                    <label>เบอร์โทรศัพท์</label>
                    <input type="tel" id="input-phone" required>
                </div>
                <div class="form-group">
                    <label>อีเมล</label>
                    <input type="email" id="input-email">
                </div>
                <div class="form-group">
                    <label>ระดับสมาชิก</label>
                    <select id="input-tier">
                        <option value="Silver">Silver</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">ยกเลิก</button>
                    <button type="submit" class="btn-primary">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function closeModal() {
            document.getElementById('member-modal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            let members = JSON.parse(localStorage.getItem('members')) || [
                { 
                    id: "MB001", 
                    name: "สมชาย รักดี", 
                    phone: "0812345678", 
                    email: "somchai@email.com", 
                    tier: "Gold", 
                    points: 1250,
                    history: [
                        { date: "10/03/2024", item: "กาแฟอาราบิก้า x2", amount: 180, points: 18, status: "สำเร็จ" },
                        { date: "05/03/2024", item: "เค้กช็อกโกแลต", amount: 120, points: 12, status: "สำเร็จ" },
                        { date: "28/02/2024", item: "เมล็ดกาแฟ 500g", amount: 450, points: 45, status: "สำเร็จ" }
                    ],
                    privileges: [
                        { title: "ส่วนลด 10% ทุกเมนู", desc: "สำหรับสมาชิกระดับ Gold ขึ้นไป", tag: "Gold Only" },
                        { title: "ฟรี! เครื่องดื่มในวันเกิด", desc: "รับสิทธิ์ได้ที่หน้าร้านทุกสาขา", tag: "Birthday" }
                    ]
                }
            ];
            let currentMember = null;
            let currentSection = 'profile';

            const modal = document.getElementById('member-modal');
            const form = document.getElementById('member-form');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');

            document.getElementById('btn-register').onclick = () => {
                document.getElementById('modal-title').innerText = "ลงทะเบียนสมาชิกใหม่";
                form.reset();
                document.getElementById('edit-member-id').value = "";
                modal.classList.remove('hidden');
            };

            document.getElementById('btn-edit-member').onclick = () => {
                if (!currentMember) return;
                document.getElementById('modal-title').innerText = "แก้ไขข้อมูล";
                document.getElementById('edit-member-id').value = currentMember.id;
                document.getElementById('input-name').value = currentMember.name;
                document.getElementById('input-phone').value = currentMember.phone;
                document.getElementById('input-email').value = currentMember.email;
                document.getElementById('input-tier').value = currentMember.tier;
                modal.classList.remove('hidden');
            };

            document.getElementById('btn-delete-member').onclick = () => {
                if (!currentMember || !confirm('ยืนยันการลบสมาชิก?')) return;
                members = members.filter(m => m.id !== currentMember.id);
                localStorage.setItem('members', JSON.stringify(members));
                currentMember = null;
                updateUI();
            };

            form.onsubmit = (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-member-id').value;
                const data = {
                    name: document.getElementById('input-name').value,
                    phone: document.getElementById('input-phone').value,
                    email: document.getElementById('input-email').value,
                    tier: document.getElementById('input-tier').value
                };

                if (id) {
                    const idx = members.findIndex(m => m.id === id);
                    members[idx] = { ...members[idx], ...data };
                    currentMember = members[idx];
                } else {
                    const newMember = { 
                        ...data, 
                        id: "MB" + String(members.length + 1).padStart(3, '0'), 
                        points: 0,
                        history: [],
                        privileges: [{ title: "ส่วนลดพิเศษ", desc: "สำหรับสมาชิกใหม่", tag: "New Member" }]
                    };
                    members.push(newMember);
                    currentMember = newMember;
                }

                localStorage.setItem('members', JSON.stringify(members));
                closeModal();
                updateUI();
            };

            searchInput.oninput = (e) => {
                const val = e.target.value.trim().toLowerCase();
                if (val.length < 1) return searchResults.classList.add('hidden');
                
                const found = members.filter(m => 
                    m.phone.includes(val) || 
                    m.id.toLowerCase().includes(val) ||
                    m.name.toLowerCase().includes(val)
                );

                if (found.length > 0) {
                    searchResults.innerHTML = found.map(m => `
                        <div class="search-item" onclick="selectMember('${m.id}')">
                            <div style="font-weight:600">${m.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-muted)">
                                รหัส: ${m.id} | โทร: ${m.phone}
                            </div>
                        </div>
                    `).join('');
                } else {
                    searchResults.innerHTML = `<div class="search-item" style="color:var(--text-muted); cursor:default">ไม่พบข้อมูลสมาชิก</div>`;
                }
                searchResults.classList.remove('hidden');
            };

            // ปิดผลการค้นหาเมื่อคลิกที่อื่น
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    searchResults.classList.add('hidden');
                }
            });

            window.selectMember = (id) => {
                currentMember = members.find(m => m.id === id);
                searchResults.classList.add('hidden');
                searchInput.value = currentMember.name;
                updateUI();
            };

            function updateUI() {
                const welcome = document.getElementById('welcome-state');
                const sections = ['profile', 'history', 'points', 'privileges'];
                
                if (!currentMember) {
                    welcome.classList.remove('hidden');
                    sections.forEach(s => document.getElementById(s + '-section').classList.add('hidden'));
                    return;
                }

                welcome.classList.add('hidden');
                document.getElementById('member-name').innerText = currentMember.name;
                document.getElementById('member-id').innerText = "รหัส: " + currentMember.id;
                document.getElementById('member-phone').innerText = currentMember.phone;
                document.getElementById('member-email').innerText = currentMember.email || "-";
                document.getElementById('member-tier').innerText = currentMember.tier;
                document.getElementById('member-points').innerText = (currentMember.points || 0).toLocaleString();
                document.getElementById('member-avatar-char').innerText = currentMember.name[0];

                // Render History
                const historyList = document.getElementById('history-list');
                if (currentMember.history && currentMember.history.length > 0) {
                    historyList.innerHTML = `
                        <table style="width:100%; border-collapse:collapse;">
                            <thead>
                                <tr style="text-align:left; border-bottom:2px solid var(--border);">
                                    <th style="padding:1rem;">วันที่</th>
                                    <th style="padding:1rem;">รายการ</th>
                                    <th style="padding:1rem;">จำนวนเงิน</th>
                                    <th style="padding:1rem;">แต้ม</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${currentMember.history.map(h => `
                                    <tr style="border-bottom:1px solid var(--border);">
                                        <td style="padding:1rem;">${h.date}</td>
                                        <td style="padding:1rem;">${h.item}</td>
                                        <td style="padding:1rem;">฿${h.amount.toLocaleString()}</td>
                                        <td style="padding:1rem; color:var(--primary);">+${h.points}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    historyList.innerHTML = '<p style="text-align:center; padding:2rem; color:var(--text-muted);">ไม่มีประวัติการซื้อสินค้า</p>';
                }

                // Render Privileges
                const privilegeList = document.getElementById('privilege-list');
                if (currentMember.privileges && currentMember.privileges.length > 0) {
                    privilegeList.innerHTML = `
                        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:1rem;">
                            ${currentMember.privileges.map(p => `
                                <div style="padding:1rem; border:2px solid var(--primary-light); border-radius:var(--radius); background:var(--bg-main);">
                                    <div style="font-size:0.7rem; background:var(--accent); color:white; display:inline-block; padding:2px 8px; border-radius:10px; margin-bottom:0.5rem;">${p.tag}</div>
                                    <div style="font-weight:700; color:var(--primary); margin-bottom:0.3rem;">${p.title}</div>
                                    <div style="font-size:0.8rem; color:var(--text-muted);">${p.desc}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    privilegeList.innerHTML = '<p style="text-align:center; padding:2rem; color:var(--text-muted);">ไม่มีสิทธิพิเศษในขณะนี้</p>';
                }

                sections.forEach(s => {
                    document.getElementById(s + '-section').classList.toggle('hidden', s !== currentSection);
                });
                lucide.createIcons();
            }

            document.querySelectorAll('.nav-links li, .mobile-nav .nav-item').forEach(li => {
                li.onclick = () => {
                    currentSection = li.dataset.section;
                    document.querySelectorAll('.nav-links li, .nav-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    updateUI();
                };
            });
        });
    </script>
</body>
</html>
